  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"86ec878e-79ce-4494-8046-f89b3eda3499\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"737506f1-e545-4ce5-9ce7-b4c4b2ce9d84\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* CorClub — App Design System\n   Tokens herdados da Login 1, expandidos para tabelas, sidebars, etc. */\n\n:root{\n  /* Brand */\n  --brand:#1747B8;\n  --brand-deep:#0E2F87;\n  --brand-darker:#081E62;\n  --brand-soft:#E8EEFB;\n  --brand-soft-2:#F1F4FB;\n\n  /* Ink scale */\n  --ink:#0B1530;\n  --ink-2:#3A4566;\n  --ink-3:#5A6485;\n  --muted:#7A8299;\n  --line:#E3E7F1;\n  --line-soft:#EEF1F8;\n  --bg:#F6F8FC;\n  --bg-2:#F0F3FA;\n  --white:#ffffff;\n\n  /* Semantic */\n  --danger:#D33A4B;\n  --danger-soft:#FDECEE;\n  --ok:#2BA37B;\n  --ok-soft:#E4F5EE;\n  --warn:#C97A1B;\n  --warn-soft:#FBEFDC;\n  --info:#1F6FB5;\n  --info-soft:#E4EFF8;\n\n  /* Shape */\n  --radius:14px;\n  --radius-sm:10px;\n  --radius-lg:18px;\n  --radius-pill:999px;\n\n  /* Shadows */\n  --shadow-sm: 0 1px 2px rgba(11,21,48,.05), 0 1px 1px rgba(11,21,48,.03);\n  --shadow-md: 0 10px 24px -16px rgba(14,47,135,.18), 0 2px 8px -4px rgba(14,47,135,.08);\n  --shadow-lg: 0 24px 60px -20px rgba(14,47,135,.25), 0 8px 20px -10px rgba(14,47,135,.15);\n\n  /* Sidebar widths */\n  --sb-w: 248px;\n  --topbar-h: 64px;\n}\n\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0;height:100%;font-family:'Manrope',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}\nbutton,input,select,textarea{font-family:inherit}\na{color:inherit}\n#root{min-height:100%}\n::selection{background:var(--brand);color:#fff}\n\n/* Etiqueta técnica em Manrope (substitui mono) */\n.tech{letter-spacing:.16em;text-transform:uppercase;font-weight:600;font-feature-settings:\"tnum\",\"ss01\"}\n\n/* ----- App layout ----- */\n.app{\n  display:grid;\n  grid-template-columns: var(--sb-w) 1fr;\n  min-height:100vh;\n}\n.main{\n  display:flex; flex-direction:column;\n  min-width:0;\n}\n.topbar{\n  height:var(--topbar-h);\n  display:flex; align-items:center; justify-content:space-between;\n  padding:0 28px;\n  border-bottom:1px solid var(--line);\n  background:rgba(255,255,255,.85);\n  backdrop-filter:saturate(140%) blur(8px);\n  -webkit-backdrop-filter:saturate(140%) blur(8px);\n  position:sticky; top:0; z-index:10;\n}\n.content{\n  padding:28px 28px 80px;\n  max-width:1480px;\n  width:100%;\n  margin:0 auto;\n}\n\n/* ----- Sidebar (light variant — Corretor) ----- */\n.sb-light{\n  background:#fff;\n  border-right:1px solid var(--line);\n  display:flex; flex-direction:column;\n  position:sticky; top:0; height:100vh;\n}\n.sb-light .sb-brand{padding:22px 22px 18px; border-bottom:1px solid var(--line-soft)}\n.sb-light .sb-nav{flex:1; padding:14px 12px; overflow-y:auto}\n.sb-light .sb-footer{padding:14px 16px; border-top:1px solid var(--line-soft)}\n\n.sb-light .nav-item{\n  display:flex; align-items:center; gap:11px;\n  padding:9px 12px; border-radius:10px;\n  font-size:13.5px; font-weight:600; color:var(--ink-2);\n  cursor:pointer; user-select:none;\n  transition:background .12s ease, color .12s ease;\n}\n.sb-light .nav-item:hover{background:var(--bg)}\n.sb-light .nav-item.active{background:var(--brand-soft); color:var(--brand)}\n.sb-light .nav-item.active .nav-icon{color:var(--brand)}\n.sb-light .nav-icon{color:var(--muted); display:flex; flex:0 0 auto}\n.sb-light .nav-group-label{\n  font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700;\n  color:var(--muted); padding:14px 14px 6px;\n}\n.sb-light .nav-badge{\n  margin-left:auto; font-size:11px; font-weight:700;\n  padding:2px 7px; border-radius:999px;\n  background:var(--brand); color:#fff;\n}\n.sb-light .nav-item.active .nav-badge{background:var(--brand-deep)}\n\n/* ----- Sidebar (dark variant — Admin) ----- */\n.sb-dark{\n  background:var(--ink);\n  color:#fff;\n  display:flex; flex-direction:column;\n  position:sticky; top:0; height:100vh;\n}\n.sb-dark .sb-brand{padding:22px 22px 18px; border-bottom:1px solid rgba(255,255,255,.06)}\n.sb-dark .sb-nav{flex:1; padding:14px 12px; overflow-y:auto}\n.sb-dark .sb-footer{padding:14px 16px; border-top:1px solid rgba(255,255,255,.06)}\n\n.sb-dark .nav-item{\n  display:flex; align-items:center; gap:11px;\n  padding:9px 12px; border-radius:10px;\n  font-size:13.5px; font-weight:600; color:rgba(255,255,255,.7);\n  cursor:pointer; user-select:none;\n  transition:background .12s ease, color .12s ease;\n}\n.sb-dark .nav-item:hover{background:rgba(255,255,255,.05); color:#fff}\n.sb-dark .nav-item.active{background:rgba(255,255,255,.08); color:#fff}\n.sb-dark .nav-item.active .nav-icon{color:#fff}\n.sb-dark .nav-icon{color:rgba(255,255,255,.55); display:flex; flex:0 0 auto}\n.sb-dark .nav-group-label{\n  font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700;\n  color:rgba(255,255,255,.4); padding:14px 14px 6px;\n}\n.sb-dark .nav-badge{\n  margin-left:auto; font-size:11px; font-weight:700;\n  padding:2px 7px; border-radius:999px;\n  background:rgba(255,255,255,.16); color:#fff;\n}\n.sb-dark .nav-item.active .nav-badge{background:#fff; color:var(--ink)}\n\n/* ----- Cards ----- */\n.card{\n  background:#fff; border:1px solid var(--line);\n  border-radius:var(--radius);\n  box-shadow:var(--shadow-sm);\n}\n.card-pad{padding:22px}\n.card-head{\n  display:flex; align-items:center; justify-content:space-between;\n  padding:18px 22px; border-bottom:1px solid var(--line-soft);\n}\n.card-title{font-size:15px; font-weight:700; letter-spacing:-.01em; margin:0}\n.card-sub{font-size:13px; color:var(--ink-3); margin:3px 0 0; font-weight:500}\n\n/* ----- Buttons ----- */\n.btn{\n  display:inline-flex; align-items:center; justify-content:center; gap:8px;\n  height:38px; padding:0 16px; border-radius:10px;\n  font-size:13.5px; font-weight:700; letter-spacing:.01em;\n  cursor:pointer; border:1px solid transparent;\n  background:transparent; color:var(--ink);\n  transition:background .12s ease, border-color .12s ease, transform .08s ease, color .12s ease;\n}\n.btn:active{transform:translateY(1px)}\n.btn-primary{background:var(--brand); color:#fff; box-shadow:0 8px 20px -10px color-mix(in oklab, var(--brand) 60%, transparent)}\n.btn-primary:hover{background:var(--brand-deep)}\n.btn-secondary{background:#fff; color:var(--ink); border-color:var(--line)}\n.btn-secondary:hover{border-color:var(--ink-2); background:var(--bg-2)}\n.btn-ghost{color:var(--ink-2)}\n.btn-ghost:hover{background:var(--bg-2); color:var(--ink)}\n.btn-danger{background:var(--danger); color:#fff}\n.btn-danger:hover{filter:brightness(.95)}\n.btn-sm{height:32px; padding:0 12px; font-size:12.5px; border-radius:8px}\n.btn-lg{height:48px; padding:0 22px; font-size:14.5px; border-radius:12px}\n.btn-icon{width:38px; padding:0; flex:0 0 auto}\n.btn-icon.btn-sm{width:32px}\n\n/* ----- Badge / Status pill ----- */\n.badge{\n  display:inline-flex; align-items:center; gap:6px;\n  padding:3px 10px; border-radius:999px;\n  font-size:11.5px; font-weight:700; letter-spacing:.02em;\n  white-space:nowrap;\n}\n.badge .dot{width:6px; height:6px; border-radius:50%; background:currentColor}\n.badge-info   { background:var(--info-soft);   color:var(--info)   }\n.badge-ok     { background:var(--ok-soft);     color:var(--ok)     }\n.badge-warn   { background:var(--warn-soft);   color:var(--warn)   }\n.badge-danger { background:var(--danger-soft); color:var(--danger) }\n.badge-neutral{ background:var(--bg-2);        color:var(--ink-2)  }\n.badge-brand  { background:var(--brand-soft);  color:var(--brand)  }\n\n/* ----- Form ----- */\n.field-label{\n  display:flex; justify-content:space-between; align-items:baseline;\n  font-size:12.5px; font-weight:600; color:var(--ink-2);\n  margin-bottom:6px;\n}\n.field-label .hint{color:var(--muted); font-weight:500; font-size:12px}\n.input, .select, .textarea{\n  width:100%; height:42px;\n  border-radius:10px;\n  background:#fff; border:1.5px solid var(--line);\n  padding:0 14px;\n  font-size:14px; color:var(--ink); font-weight:500;\n  transition:border-color .12s ease, box-shadow .12s ease;\n  outline:none;\n}\n.input:focus, .select:focus, .textarea:focus{\n  border-color:var(--brand);\n  box-shadow:0 0 0 4px color-mix(in oklab, var(--brand) 14%, transparent);\n}\n.textarea{height:auto; padding:11px 14px; min-height:90px; resize:vertical; line-height:1.5}\n.select{appearance:none; -webkit-appearance:none; background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%237A8299' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/><\u002Fsvg>\"); background-repeat:no-repeat; background-position:right 12px center; padding-right:34px}\n\n.input-wrap{position:relative; display:flex; align-items:center}\n.input-wrap .input{padding-left:40px}\n.input-wrap .lead{position:absolute; left:14px; color:var(--muted); display:flex; pointer-events:none}\n\n/* ----- Table ----- */\n.table{\n  width:100%; border-collapse:separate; border-spacing:0;\n  font-size:13.5px; color:var(--ink);\n}\n.table th{\n  text-align:left; font-weight:700; font-size:11.5px; letter-spacing:.04em; text-transform:uppercase;\n  color:var(--muted);\n  padding:12px 16px;\n  border-bottom:1px solid var(--line);\n  background:var(--bg-2);\n  position:sticky; top:0;\n}\n.table th:first-child{border-top-left-radius:var(--radius)}\n.table th:last-child{border-top-right-radius:var(--radius)}\n.table td{\n  padding:14px 16px;\n  border-bottom:1px solid var(--line-soft);\n  vertical-align:middle;\n}\n.table tr:last-child td{border-bottom:none}\n.table tr:hover td{background:color-mix(in oklab, var(--brand-soft) 35%, transparent)}\n.table .num{font-variant-numeric:tabular-nums; font-weight:600}\n.table .cell-strong{font-weight:700; color:var(--ink)}\n\n/* ----- Tabs ----- */\n.tabs{display:inline-flex; gap:4px; padding:4px; background:var(--bg-2); border-radius:10px}\n.tab{\n  height:32px; padding:0 14px; border-radius:8px;\n  display:inline-flex; align-items:center; gap:8px;\n  font-size:13px; font-weight:600; color:var(--ink-2);\n  cursor:pointer; background:transparent; border:none;\n}\n.tab:hover{color:var(--ink)}\n.tab.active{background:#fff; color:var(--ink); box-shadow:var(--shadow-sm)}\n.tab .count{\n  font-size:11px; padding:1px 7px; border-radius:999px;\n  background:var(--line); color:var(--ink-3); font-weight:700;\n}\n.tab.active .count{background:var(--brand-soft); color:var(--brand)}\n\n/* ----- Page header ----- */\n.page-head{\n  display:flex; align-items:flex-end; justify-content:space-between;\n  gap:24px; margin-bottom:22px;\n}\n.page-title{font-size:26px; font-weight:800; letter-spacing:-.02em; margin:0; color:var(--ink)}\n.page-sub{font-size:14px; color:var(--ink-3); margin:6px 0 0; max-width:640px; line-height:1.5}\n.page-eyebrow{\n  font-size:11px; letter-spacing:.18em; text-transform:uppercase; font-weight:700;\n  color:var(--brand); margin-bottom:8px;\n}\n\n/* ----- Grids ----- */\n.grid-stats{display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:16px}\n.grid-2{display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:16px}\n.grid-3{display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:16px}\n@media (max-width: 1100px){ .grid-stats{grid-template-columns:repeat(2, 1fr)} }\n\n/* ----- Stat card ----- */\n.stat{\n  background:#fff; border:1px solid var(--line); border-radius:var(--radius);\n  padding:20px; display:flex; flex-direction:column; gap:8px;\n  position:relative; overflow:hidden;\n}\n.stat-label{font-size:12.5px; color:var(--muted); font-weight:600; letter-spacing:.02em}\n.stat-value{font-size:30px; font-weight:800; letter-spacing:-.02em; color:var(--ink); font-variant-numeric:tabular-nums}\n.stat-delta{\n  display:inline-flex; align-items:center; gap:5px;\n  font-size:12px; font-weight:700;\n}\n.stat-delta.up{color:var(--ok)}\n.stat-delta.down{color:var(--danger)}\n.stat-spark{position:absolute; right:14px; bottom:14px; opacity:.9}\n\n/* ----- Avatar ----- */\n.avatar{\n  width:32px; height:32px; border-radius:50%;\n  display:inline-flex; align-items:center; justify-content:center;\n  font-size:12px; font-weight:800; color:#fff;\n  background:linear-gradient(135deg, #6FA0FF, #2A52CC);\n  flex:0 0 auto;\n}\n.avatar-sm{width:26px; height:26px; font-size:10.5px}\n.avatar-lg{width:44px; height:44px; font-size:15px}\n\n/* ----- Misc ----- */\n.divider{height:1px; background:var(--line); margin:18px 0}\n.kbd{\n  font-size:11px; padding:2px 6px; border-radius:6px;\n  border:1px solid var(--line); background:#fff; color:var(--ink-2); font-weight:700;\n}\n.scroll-x{overflow-x:auto}\n\n/* Topbar search */\n.topbar-search{\n  flex:1; max-width:480px;\n  display:flex; align-items:center; gap:10px;\n  height:38px; padding:0 14px;\n  background:var(--bg-2); border-radius:10px;\n  color:var(--muted); font-size:13.5px;\n  border:1px solid transparent;\n  cursor:text;\n}\n.topbar-search:hover{border-color:var(--line)}\n.topbar-search input{\n  flex:1; min-width:0; border:none; background:transparent; outline:none;\n  font-size:13.5px; color:var(--ink); font-weight:500;\n}\n.topbar-search input::placeholder{color:var(--muted)}\n\n/* Empty state */\n.empty{\n  text-align:center; padding:60px 24px; color:var(--ink-3);\n}\n.empty h4{font-size:16px; color:var(--ink); margin:14px 0 4px; font-weight:700}\n.empty p{margin:0; font-size:13.5px}\n\n/* Progress bar */\n.progress{\n  height:6px; background:var(--bg-2); border-radius:999px; overflow:hidden;\n}\n.progress > span{\n  display:block; height:100%; background:var(--brand);\n  border-radius:999px;\n}\n\n/* Sober chip for admin dark sidebar — used outside sidebar too */\n.chip{\n  display:inline-flex; align-items:center; gap:6px;\n  height:24px; padding:0 9px; border-radius:6px;\n  font-size:11.5px; font-weight:700; letter-spacing:.02em;\n  background:var(--bg-2); color:var(--ink-2);\n}\n\n/* Animations */\n@keyframes spin{to{transform:rotate(360deg)}}\n.spin{animation:spin .8s linear infinite}\n<\u002Fstyle>\n<style>\n  body{background:#fff;color:var(--ink)}\n  .container{max-width:1240px;margin:0 auto;padding:0 32px}\n  @media (max-width:720px){ .container{padding:0 20px} }\n\n  /* ---------- Topband + masthead ---------- */\n  .topband{background:#0B1530;color:rgba(255,255,255,.78);font-size:13px;font-weight:500}\n  .topband .container{height:46px;display:flex;align-items:center;justify-content:space-between;gap:24px}\n  .topband-info{display:flex;align-items:center;gap:26px;flex-wrap:wrap}\n  .topband-info span{display:inline-flex;align-items:center;gap:8px}\n  .topband-info b{color:#fff;font-weight:700}\n  .topband-info i{display:inline-flex;color:rgba(255,255,255,.55)}\n  .topband-social{display:flex;gap:6px}\n  .topband-social a{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7)}\n  .topband-social a:hover{background:rgba(255,255,255,.08);color:#fff}\n  @media (max-width:780px){ .topband-info span:nth-child(2){display:none} }\n\n  .masthead{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:saturate(140%) blur(10px);-webkit-backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--line-soft)}\n  .masthead .container{height:88px;display:flex;align-items:center;justify-content:space-between;gap:24px}\n  .brand{display:inline-flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink)}\n  .brand-mark{width:54px;height:54px;border-radius:14px;background:var(--brand);display:inline-flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 20px -10px color-mix(in oklab, var(--brand) 60%, transparent)}\n  .brand-mark svg{width:34px;height:34px}\n  .brand-name{display:flex;flex-direction:column;line-height:1}\n  .brand-name .n1{font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}\n  .brand-name .n1 b{color:var(--brand);font-weight:800}\n  .brand-name .n2{font-size:11.5px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:5px}\n  .nav{display:flex;align-items:center;gap:4px}\n  .nav a{padding:10px 14px;font-size:14px;font-weight:600;color:var(--ink-2);text-decoration:none;border-radius:8px}\n  .nav a:hover{background:var(--bg);color:var(--ink)}\n  .nav a.active{color:var(--brand)}\n  .masthead-cta{display:flex;align-items:center;gap:10px}\n  .btn-pill{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;border-radius:999px;font-size:13.5px;font-weight:700;text-decoration:none}\n  .btn-pill.outline{background:#fff;border:1.5px solid var(--line);color:var(--ink)}\n  .btn-pill.outline:hover{border-color:var(--brand);color:var(--brand)}\n  .btn-pill.solid{background:var(--brand);color:#fff;border:1.5px solid var(--brand)}\n  .btn-pill.solid:hover{background:var(--brand-deep);border-color:var(--brand-deep)}\n  @media (max-width:1080px){ .nav{display:none} }\n  @media (max-width:560px){ .brand-name .n2{display:none} .brand-mark{width:46px;height:46px} .brand-mark svg{width:28px;height:28px} .masthead .container{height:74px} }\n\n  /* ---------- Page hero ---------- */\n  .ph{background:linear-gradient(160deg, var(--brand) 0%, var(--brand-deep) 60%, var(--brand-darker) 100%);color:#fff;padding:90px 0 80px;position:relative;overflow:hidden}\n  .ph::before{content:\"\";position:absolute;inset:0;background:\n    radial-gradient(800px 500px at 10% 10%, rgba(63,119,255,.3), transparent 60%),\n    radial-gradient(700px 500px at 95% 95%, rgba(10,31,94,.7), transparent 60%);\n    pointer-events:none}\n  .ph-dots{position:absolute;inset:0;opacity:.18;background-image:radial-gradient(rgba(255,255,255,.6) 1px, transparent 1px);background-size:24px 24px;pointer-events:none}\n  .ph .container{position:relative;z-index:1}\n  .crumb{display:flex;align-items:center;gap:8px;font-size:12.5px;color:rgba(255,255,255,.65);font-weight:600;letter-spacing:.04em;margin-bottom:18px}\n  .crumb a{color:inherit;text-decoration:none}\n  .crumb a:hover{color:#fff}\n  .crumb i{opacity:.4}\n  .ph-eyebrow{display:inline-flex;align-items:center;gap:10px;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);font-size:12.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}\n  .ph-eyebrow .dot{width:7px;height:7px;border-radius:50%;background:#7BE0B5}\n  .ph h1{font-size:clamp(40px,5.4vw,72px);font-weight:800;letter-spacing:-.03em;line-height:1.0;margin:18px 0 0;max-width:900px;text-wrap:balance}\n  .ph h1 em{font-style:italic;color:#7BE0B5;font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.02em}\n  .ph .lede{margin-top:22px;font-size:18px;line-height:1.6;color:rgba(255,255,255,.78);max-width:640px}\n  .ph-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:36px}\n  .ph-pills .pill{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);font-size:12.5px;font-weight:600;color:rgba(255,255,255,.85)}\n  .ph-pills .pill svg{color:#7BE0B5}\n\n  /* ---------- Sections ---------- */\n  section.page{padding:110px 0;position:relative}\n  @media (max-width:780px){ section.page{padding:72px 0} }\n  .sec-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--brand);margin-bottom:14px}\n  .sec-eyebrow::before{content:\"\";width:24px;height:2px;background:var(--brand);border-radius:2px}\n  .sec-title{font-size:clamp(30px,3.4vw,48px);font-weight:800;letter-spacing:-.025em;line-height:1.05;margin:0;color:var(--ink);text-wrap:balance}\n  .sec-lede{font-size:17px;line-height:1.6;color:var(--ink-2);margin:18px 0 0;max-width:640px}\n  .sec-head-row{display:flex;justify-content:space-between;align-items:flex-end;gap:32px;margin-bottom:56px;flex-wrap:wrap}\n\n  /* ---------- Detailed vantagem rows ---------- */\n  .vt-list{display:flex;flex-direction:column;gap:28px}\n  .vt{display:grid;grid-template-columns:1fr 1.1fr;gap:60px;align-items:center;padding:48px;background:#fff;border:1px solid var(--line);border-radius:24px;position:relative;overflow:hidden;transition:box-shadow .2s ease, border-color .2s ease}\n  .vt:hover{box-shadow:0 30px 60px -36px rgba(14,47,135,.22);border-color:var(--brand-soft)}\n  .vt.reverse{grid-template-columns:1.1fr 1fr}\n  .vt.reverse .vt-media{order:2}\n  @media (max-width:980px){ .vt, .vt.reverse{grid-template-columns:1fr;gap:32px;padding:32px} .vt.reverse .vt-media{order:initial} }\n\n  .vt-meta{display:flex;align-items:center;gap:12px;margin-bottom:18px}\n  .vt-meta .num{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.18em}\n  .vt-meta .sep{height:1px;background:var(--line);flex:1}\n  .vt-meta .tag{font-size:11.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);padding:3px 9px;background:var(--brand-soft);border-radius:6px}\n\n  .vt h3{margin:0 0 14px;font-size:32px;font-weight:800;letter-spacing:-.025em;line-height:1.1;color:var(--ink);text-wrap:balance}\n  .vt p.lede{margin:0 0 22px;font-size:16px;color:var(--ink-2);line-height:1.65}\n  .vt-points{margin:0 0 26px;padding:0;list-style:none;display:flex;flex-direction:column;gap:12px}\n  .vt-points li{display:flex;gap:12px;align-items:flex-start;font-size:14.5px;color:var(--ink-2);line-height:1.55}\n  .vt-points li svg{flex:0 0 auto;color:var(--brand);margin-top:3px}\n  .vt-points li b{color:var(--ink);font-weight:700}\n  .vt-cta{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--brand);text-decoration:none}\n  .vt-cta svg{transition:transform .15s ease}\n  .vt-cta:hover svg{transform:translateX(4px)}\n\n  /* Visual media for each vantagem */\n  .vt-media{position:relative;aspect-ratio:5/4;border-radius:18px;overflow:hidden;background:var(--bg);border:1px solid var(--line)}\n\n  /* media 1 — cotacao multi-operadora */\n  .m-cot{padding:28px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(160deg, #fff, var(--bg-2))}\n  .m-cot .head{display:flex;justify-content:space-between;align-items:center;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:6px}\n  .m-cot .head b{font-size:13px;font-weight:800;color:var(--ink)}\n  .m-cot .head span{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em}\n  .m-cot .item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#fff;border:1px solid var(--line);border-radius:10px}\n  .m-cot .item.best{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}\n  .m-cot .item .nm{font-size:13px;font-weight:700;color:var(--ink)}\n  .m-cot .item .sub{font-size:11px;color:var(--muted);margin-top:1px}\n  .m-cot .item .pr{font-size:14px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}\n  .m-cot .item.best .pr{color:var(--brand)}\n\n  /* media 2 — kanban */\n  .m-kan{padding:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:linear-gradient(160deg, var(--ink), #14213D)}\n  .m-kan .col{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;display:flex;flex-direction:colu irection:column;justify-content:space-between;position:relative}\n  .m-sup::before{content:\"\";position:absolute;inset:0;background:radial-gradient(400px 250px at 80% 20%, rgba(255,255,255,.15), transparent 60%);pointer-events:none}\n  .m-sup .pl{position:relative;display:flex;align-items:flex-start;gap:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px;margin-bottom:10px}\n  .m-sup .pl.you{background:#fff;color:var(--ink);border-color:transparent;align-self:flex-end;max-width:80%}\n  .m-sup .pl .av{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:0 0 auto}\n  .m-sup .pl.you .av{background:var(--brand);color:#fff}\n  .m-sup .pl .msg{font-size:13px;line-height:1.5}\n  .m-sup .pl .msg b{display:block;font-size:11.5px;letter-spacing:.04em;color:rgba(255,255,255,.7);margin-bottom:3px}\n  .m-sup .pl.you .msg b{color:var(--muted)}\n  .m-sup .ind{position:relative;display:inline-flex;align-items:center;gap:8px;align-self:flex-start;font-size:11.5px;color:rgba(255,255,255,.7);margin-top:auto}\n  .m-sup .ind .d{width:6px;height:6px;border-radius:50%;background:#7BE0B5;box-shadow:0 0 0 4px rgba(123,224,181,.18)}\n\n  /* media 5 — lgpd / segurança */\n  .m-sec{padding:32px;background:linear-gradient(160deg, var(--ink), #14213D);color:#fff;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}\n  .m-sec .sh{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#7BE0B5;margin-bottom:20px;position:relative}\n  .m-sec .sh::before{content:\"\";position:absolute;inset:-12px;border-radius:50%;border:1px dashed rgba(123,224,181,.3);animation:spinSlow 30s linear infinite}\n  @keyframes spinSlow{to{transform:rotate(360deg)}}\n  .m-sec h4{margin:0 0 6px;font-size:18px;font-weight:800;color:#fff}\n  .m-sec p{margin:0 0 18px;font-size:13px;color:rgba(255,255,255,.6);max-width:280px;line-height:1.55}\n  .m-sec .chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}\n  .m-sec .chips span{font-size:10.5px;font-weight:800;color:#7BE0B5;background:rgba(123,224,181,.1);border:1px solid rgba(123,224,181,.25);padding:4px 10px;border-radius:999px;letter-spacing:.04em}\n\n  /* media 6 — insights */\n  .m-ins{padding:28px;background:#fff;display:flex;flex-direction:column;gap:14px}\n  .m-ins .top{display:flex;justify-content:space-between;align-items:center}\n  .m-ins .top b{font-size:13px;font-weight:800;color:var(--ink)}\n  .m-ins .top .per{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;background:var(--bg-2);padding:3px 9px;border-radius:6px}\n  .m-ins .rank{display:flex;flex-direction:column;gap:8px}\n  .m-ins .rk{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:10px;font-size:12px}\n  .m-ins .rk .pos{width:22px;height:22px;border-radius:50%;background:var(--brand-soft);color:var(--brand);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}\n  .m-ins .rk:first-child .pos{background:var(--brand);color:#fff}\n  .m-ins .rk .nm{font-weight:700;color:var(--ink)}\n  .m-ins .rk .sub{font-size:10.5px;color:var(--muted);margin-top:1px}\n  .m-ins .rk .delta{font-weight:800;color:var(--ok);font-variant-numeric:tabular-nums}\n\n  /* ====================== EXPERIENCES ====================== */\n  .exp-wrap{background:linear-gradient(180deg, var(--ink) 0%, #050B1F 100%);color:#fff;position:relative;overflow:hidden}\n  .exp-wrap::before{content:\"\";position:absolute;inset:0;background:\n    radial-gradient(900px 500px at 20% 0%, rgba(23,71,184,.4), transparent 50%),\n    radial-gradient(700px 500px at 90% 60%, rgba(212,175,55,.18), transparent 50%);\n    pointer-events:none}\n  .exp-wrap .container{position:relative;z-index:1}\n\n  .exp-marker{display:inline-flex;align-items:center;gap:14px;padding:7px 16px;border-radius:999px;background:linear-gradient(90deg, rgba(212,175,55,.15), rgba(212,175,55,.05));border:1px solid rgba(212,175,55,.35);font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#D4AF37;margin-bottom:32px}\n  .exp-marker svg{color:#D4AF37}\n  .exp-marker .d{width:6px;height:6px;border-radius:50%;background:#D4AF37}\n\n  .exp-intro{display:grid;grid-template-columns:1.2fr 1fr;gap:80px;align-items:start;padding-top:120px;padding-bottom:60px}\n  @media (max-width:980px){ .exp-intro{grid-template-columns:1fr;gap:40px;padding-top:80px} }\n  .exp-intro h2{margin:0;font-size:clamp(40px,5.4vw,72px);font-weight:800;letter-spacing:-.03em;line-height:1.0;color:#fff;text-wrap:balance}\n  .exp-intro h2 em{font-style:italic;color:#D4AF37;font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.02em}\n  .exp-intro .lede{margin:24px 0 0;font-size:17px;line-height:1.65;color:rgba(255,255,255,.7);max-width:520px}\n  .exp-intro .lede em{color:#D4AF37;font-style:normal;font-weight:700}\n  .exp-aside{padding:32px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:20px;position:sticky;top:108px}\n  .exp-aside h5{margin:0 0 8px;font-size:11.5px;font-weight:800;color:#D4AF37;letter-spacing:.18em;text-transform:uppercase}\n  .exp-aside p{margin:0;font-size:14px;color:rgba(255,255,255,.7);line-height:1.6}\n  .exp-aside .tiers{display:flex;flex-direction:column;gap:14px;margin-top:24px;padding-top:24px;border-top:1px solid rgba(255,255,255,.08)}\n  .exp-aside .tier{display:flex;align-items:center;gap:14px;font-size:13px}\n  .exp-aside .tier .badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;letter-spacing:.04em;flex:0 0 auto}\n  .exp-aside .tier .badge.silver{background:rgba(192,192,192,.1);color:#C0C0C0;border:1px solid rgba(192,192,192,.25)}\n  .exp-aside .tier .badge.gold{background:rgba(212,175,55,.12);color:#D4AF37;border:1px solid rgba(212,175,55,.35)}\n  .exp-aside .tier .badge.platinum{background:linear-gradient(135deg, #E5E4E2, #B4B4B6);color:var(--ink);border:1px solid rgba(255,255,255,.4)}\n  .exp-aside .tier .nm{font-weight:700;color:#fff}\n  .exp-aside .tier .sub{font-size:11.5px;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.04em}\n\n  /* Experiences grid */\n  .exp-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px;padding-bottom:120px}\n  .exp-card{position:relative;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);min-height:380px;display:flex;flex-direction:column;justify-content:flex-end;padding:32px;transition:transform .2s ease, border-color .2s ease}\n  .exp-card:hover{transform:translateY(-4px);border-color:rgba(212,175,55,.3)}\n  .exp-card::before{content:\"\";position:absolute;inset:0;background:linear-gradient(180deg, transparent 40%, rgba(0,0,0,.6));pointer-events:none;z-index:0}\n  .exp-card > *{position:relative;z-index:1}\n\n  .exp-card.feat{grid-column:span 7;min-height:480px}\n  .exp-card.sm{grid-column:span 5}\n  .exp-card.thr{grid-column:span 4}\n  .exp-card.full{grid-column:span 12;min-height:300px}\n  @media (max-width:980px){\n    .exp-card.feat, .exp-card.sm, .exp-card.thr, .exp-card.full{grid-column:span 12}\n  }\n\n  .exp-art{position:absolute;inset:0;z-index:0}\n  .exp-card .lbl{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;padding:5px 11px;border-radius:999px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.18);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#fff;backdrop-filter:blur(6px);margin-bottom:auto;align-self:start}\n  .exp-card .lbl.gold{color:#D4AF37;border-color:rgba(212,175,55,.4)}\n  .exp-card h4{margin:18px 0 8px;fon n<\u002Fsection>\n\n<!-- FAQ -->\n<section class=\"page\" id=\"faq\">\n  <div class=\"container\">\n    <div class=\"sec-head-row\" style=\"justify-content:center;text-align:center;flex-direction:column;align-items:center;margin-bottom:48px\">\n      <div class=\"sec-eyebrow\">Perguntas frequentes<\u002Fdiv>\n      <h2 class=\"sec-title\">Dúvidas sobre vantagens e Experiences.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"faq-list\">\n      <details class=\"faq\">\n        <summary>Como faço para ser elegível ao Experiences?<\u002Fsummary>\n        <p>Basta ser corretor parceiro CorClub e operar pelo painel. O ranking é calculado automaticamente todo mês com base em propostas aprovadas, retenção e NPS. Você pode acompanhar sua posição no painel a qualquer momento.<\u002Fp>\n      <\u002Fdetails>\n      <details class=\"faq\">\n        <summary>O Experiences tem custo?<\u002Fsummary>\n        <p>Nenhum. Todas as experiências — viagens, mentorias, eventos, cerimônia de premiação — são custeadas pela CorClub. Você só paga eventual acompanhante extra em viagens.<\u002Fp>\n      <\u002Fdetails>\n      <details class=\"faq\">\n        <summary>Em quanto tempo eu recebo as comissões?<\u002Fsummary>\n        <p>Todo dia 5 do mês seguinte ao da emissão da proposta. Se cair em fim de semana ou feriado, o pagamento é antecipado para o dia útil anterior. Para Platinum, é possível antecipar parcelas mediante taxa reduzida.<\u002Fp>\n      <\u002Fdetails>\n      <details class=\"faq\">\n        <summary>O ranking é resetado todo ano?<\u002Fsummary>\n        <p>Sim. O ano-base é de janeiro a dezembro, com apuração final em janeiro do ano seguinte. As Experiences do ano são entregues entre fevereiro e dezembro do ano corrente.<\u002Fp>\n      <\u002Fdetails>\n      <details class=\"faq\">\n        <summary>E se eu vender muito mas o NPS dos clientes for baixo?<\u002Fsummary>\n        <p>Não entra no ranking. O Experiences premia o corretor que vende com qualidade — todos os tiers
