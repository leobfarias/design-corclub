<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  /* Tokens alinhados com Login 1 (fonte da verdade) */
  :root{
    --brand:#1747B8;
    --brand-deep:#0E2F87;
    --brand-soft:#E8EEFB;
    --ink:#0B1530;
    --ink-2:#3A4566;
    --muted:#7A8299;
    --line:#E3E7F1;
    --bg:#F6F8FC;
    --white:#ffffff;
    --danger:#D33A4B;
    --ok:#2BA37B;
    --radius:14px;
    --shadow-lg: 0 24px 60px -20px rgba(14, 47, 135, .25), 0 8px 20px -10px rgba(14, 47, 135, .15);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:'Manrope',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  button,input{font-family:inherit}
  a{color:inherit}
  #root{min-height:100%}
  /* Etiqueta técnica — substitui o uso de mono, mantém a hierarquia "técnica" com Manrope */
  .tech{letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  ::selection{background:var(--brand);color:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="login-2.jsx"></script>
</body>
