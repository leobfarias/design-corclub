<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CorClub — Login 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  /* Tokens alinhados com Login 1 (fonte da verdade).
     --brand-darker é exclusivo do tratamento dark/glass desta variação. */
  :root{
    --brand:#1747B8;
    --brand-deep:#0E2F87;
    --brand-darker:#081E62;
    --brand-soft:#E8EEFB;
    --ink:#0B1530;
    --ink-2:#3A4566;
    --muted:#7A8299;
    --line:#E3E7F1;
    --bg:#F6F8FC;
    --white:#ffffff;
    --danger:#D33A4B;
    --ok:#2BA37B;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--brand-deep);color:#fff;font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  button,input{font-family:inherit}
  a{color:inherit}
  #root{min-height:100%}
  /* Etiqueta técnica em Manrope (substitui o uso de mono) */
  .tech{letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  ::selection{background:#fff;color:var(--brand-deep)}

  .stage{
    position:fixed;inset:0;z-index:0;overflow:hidden;
    background:
      radial-gradient(60% 50% at 18% 22%, rgba(63,119,255,.55), transparent 60%),
      radial-gradient(55% 50% at 84% 78%, rgba(8,30,98,.85), transparent 60%),
      radial-gradient(40% 35% at 80% 10%, rgba(120,170,255,.30), transparent 60%),
      linear-gradient(160deg, var(--brand) 0%, var(--brand-deep) 55%, var(--brand-darker) 100%);
  }
  .stage::before{
    content:"";position:absolute;inset:-15%;
    background:
      radial-gradient(35% 30% at 22% 28%, rgba(120,170,255,.30), transparent 60%),
      radial-gradient(30% 25% at 78% 25%, rgba(60,120,255,.30), transparent 60%),
      radial-gradient(40% 35% at 30% 78%, rgba(40,90,220,.30), transparent 60%);
    filter: blur(40px);
    animation: drift 24s ease-in-out infinite alternate;
  }
  .stage::after{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(80% 80% at 50% 40%, #000 30%, transparent 75%);
  }
  @keyframes drift {
    0%   { transform: translate(0,0) scale(1) }
    50%  { transform: translate(-3%,2%) scale(1.05) }
    100% { transform: translate(2%,-2%) scale(1.02) }
  }
  .noise{
    position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.06;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* Giant outline mark — decorative */
  .ghost-mark{
    position:fixed;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:min(1100px, 95vw);
    height:auto;
    opacity:.10;
    pointer-events:none;
    z-index:1;
  }
</style>
</head>
<body>
<div class="stage"></div>
<div class="noise"></div>
<svg class="ghost-mark" viewBox="0 0 64 44" aria-hidden>
  <g fill="none" stroke="#FFFFFF" stroke-width=".35">
    <circle cx="16" cy="10" r="7"/>
    <circle cx="48" cy="10" r="7"/>
    <path d="M2 40c0-12 8-20 14-20 5 0 9 5 9 12v8H2z"/>
    <path d="M39 40v-8c0-7 4-12 9-12 6 0 14 8 14 20H39z"/>
    <path d="M22 40v-8c0-5 4-9 10-9s10 4 10 9v8H22z"/>
  </g>
</svg>
<div id="root" style="position:relative;z-index:2"></div>
<script type="text/babel" src="js/login-3.jsx"></script>
</body>
</html>
